# CI workflow for rules_flutter
#
# Runs repo-root tests (Starlark unit tests, buildifier lint) and
# e2e tests across all workspaces on every push/PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rules_dart is a local_path_override dependency — clone it next to this repo.
      # Use git clone instead of actions/checkout which rejects paths outside the workspace.
      - name: Clone rules_dart
        run: git clone --depth 1 https://github.com/aran/rules_dart.git ../rules_dart

      - name: Mount Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-unit-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-unit-${{ runner.os }}-

      # On a cold cache this job resolves the full root MODULE.bazel, whose
      # rules_android_maven install pulls a large androidx/coursier closure.
      # Coursier's JVM plus Bazel's own server JVM can spike past the 7 GB
      # ubuntu-latest runner's RAM during the loading phase, and the OOM killer
      # SIGKILLs Bazel mid-load (the step dies ~10 s in with no Bazel error).
      # Extra swap gives that transient peak somewhere to go. The e2e workspaces
      # use smaller per-workspace modules and don't hit this.
      - name: Add swap headroom (cold maven resolution + Bazel JVM)
        run: |
          sudo fallocate -l 10G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      - name: bazel test //...
        run: bazel test //...

  dart-tool-tests:
    name: Dart tool tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - name: Run dev_tool tests
        working-directory: tools/dev_tool
        # Exclude e2e tests (tagged @Tags(['e2e'])): they need a browser/CDP,
        # iOS simulators, or a running macOS app — none available on this
        # runner. Real-render coverage lives in the Bazel e2e workspaces and
        # the Playwright suite.
        run: dart test -x e2e

      - name: Run private tool tests
        working-directory: flutter/private/tools
        run: dart pub get && dart test

  e2e:
    name: E2E (${{ matrix.workspace }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - smoke
          - hello_world
          - ffi_example
          - plugin_example
          - ffi_plugin_example
          - codegen
        os:
          - macos-latest
        include:
          # Run hello_world on Linux for native Linux bundle testing.
          - workspace: hello_world
            os: ubuntu-latest
          # Run hello_world on Windows for native Windows bundle testing.
          - workspace: hello_world
            os: windows-latest
          # Run codegen on Linux (no platform-specific code).
          - workspace: codegen
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rules_dart is a local_path_override dependency — clone it next to this repo.
      # Use git clone instead of actions/checkout which rejects paths outside the workspace.
      - name: Clone rules_dart
        run: git clone --depth 1 https://github.com/aran/rules_dart.git ../rules_dart

      # The Xcode build number is part of the cache key so a runner-image Xcode
      # bump invalidates the cache instead of restoring one whose cached Swift
      # compile actions reference an Xcode that is no longer installed. Without
      # this, after macos-latest moved from Xcode 16.4 to 26.x, restored caches
      # asked `xcode-locator 16.4.0.16F6` for a missing Xcode and failed the
      # iOS build (e.g. plugin_example's audio_session Swift module).
      - name: Capture Xcode build for cache key (macOS)
        if: runner.os == 'macOS'
        run: echo "XCODE_BUILD=$(xcodebuild -version | tail -1 | awk '{print $NF}')" >> "$GITHUB_ENV"

      - name: Mount Bazel cache (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/bazel
          key: bazel-e2e-${{ matrix.workspace }}-${{ runner.os }}-xc${{ env.XCODE_BUILD }}-${{ hashFiles(format('e2e/{0}/MODULE.bazel', matrix.workspace)) }}
          restore-keys: bazel-e2e-${{ matrix.workspace }}-${{ runner.os }}-xc${{ env.XCODE_BUILD }}-

      - name: Mount Bazel cache (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-e2e-${{ matrix.workspace }}-${{ runner.os }}-${{ hashFiles(format('e2e/{0}/MODULE.bazel', matrix.workspace)) }}
          restore-keys: bazel-e2e-${{ matrix.workspace }}-${{ runner.os }}-

      - name: Mount Bazel cache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: C:/_bazel_cache
          key: bazel-e2e-${{ matrix.workspace }}-${{ runner.os }}-${{ hashFiles(format('e2e/{0}/MODULE.bazel', matrix.workspace)) }}
          restore-keys: bazel-e2e-${{ matrix.workspace }}-${{ runner.os }}-

      - name: Install GTK3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      # GitHub's windows-latest image exports ANDROID_NDK_HOME with backslashes
      # (C:\Android\...), but rules_android_ndk's _create_symlinks() strips the
      # NDK prefix with a forward-slash string match against ctx.path() output,
      # so a backslashed value makes the symlink target escape the repo dir and
      # the fetch fails. Hand it a forward-slash path, as upstream's own Windows
      # CI does. See https://github.com/bazelbuild/rules_android_ndk/pull/108
      - name: Normalize ANDROID_NDK_HOME to forward slashes (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ndk = $env:ANDROID_NDK_HOME ?? $env:ANDROID_NDK_ROOT
          "ANDROID_NDK_HOME=$($ndk -replace '\\','/')" >> $env:GITHUB_ENV

      - name: bazel test //... (e2e/${{ matrix.workspace }})
        if: runner.os != 'Windows'
        working-directory: e2e/${{ matrix.workspace }}
        run: bazel test //...

      # On Windows, Bazel's default output root lives under a long per-user
      # temp path; nested runfiles (e.g. the hermetic Python interpreter's
      # _socket.pyd used by rules_android's aar_embedded_jars_extractor) then
      # exceed the 260-char MAX_PATH limit and fail to load with
      # "DLL load failed ... The filename or extension is too long".
      # A short --output_user_root keeps every generated path well under MAX_PATH.
      # (`BAZEL_OUTPUT_BASE` is not read by Bazel; the startup flag is required.)
      # --*_tag_filters=-no-windows-ci skips targets that build fine on
      # macOS/Linux but exceed the windows-latest runner's commit limit
      # (RAM + its small fixed pagefile). Today that's hello_world's Android
      # target: rules_android's resource compiler launches its JVM with
      # -Xms3G, eagerly committing 3 GiB and OOMing. Android is still covered
      # on the macOS and Linux runners. The build filter (not just the test
      # filter) is required because `bazel test //...` builds every matched
      # target, including the non-test app, so a test-only filter wouldn't
      # stop the OOMing build action.
      - name: bazel test //... (e2e/${{ matrix.workspace }})
        if: runner.os == 'Windows'
        working-directory: e2e/${{ matrix.workspace }}
        run: bazel --output_user_root=C:/b test //... --build_tag_filters=-no-windows-ci --test_tag_filters=-no-windows-ci
